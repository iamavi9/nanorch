version: "3.9"

# ─────────────────────────────────────────────────────────────
#  NanoOrch — Docker Compose with Docker Secrets
#
#  Use this file instead of docker-compose.yml when you want
#  sensitive values kept OUT of `docker inspect Env` output.
#
#  How it works:
#    • Each secret is a plain text file on the host (one value per file).
#    • Docker mounts the files read-only at /run/secrets/<name> inside
#      the container.
#    • The app reads the value via <NAME>_FILE env vars using the
#      _FILE pattern (server/lib/secrets.ts).
#    • `docker inspect` only shows the _FILE path — never the real value.
#
#  Quick start:
#    1. Run the setup helper to create all required secret files:
#         ./secrets/create-secrets.sh
#       (generates random postgres password + encryption key + session secret,
#        auto-constructs the DATABASE_URL — no manual URL entry needed)
#    2. Build images (only needed once or when code changes):
#         docker build -t nanoorch-agent:latest ./agent
#         docker build -t nanoorch-sandbox:latest ./agent/sandbox
#         docker compose -f docker-compose.secrets.yml build
#    3. Start:
#         docker compose -f docker-compose.secrets.yml up -d
#    4. View logs:
#         docker compose -f docker-compose.secrets.yml logs -f app
# ─────────────────────────────────────────────────────────────

# ── Secret file declarations ──────────────────────────────────
# Each entry maps a secret name to a file on the host.
# The file must exist and contain ONLY the secret value (no trailing spaces).
# Run ./secrets/create-secrets.sh to generate all files automatically.
secrets:
  session_secret:
    file: ./secrets/session_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  database_url:
    file: ./secrets/database_url.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt


services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nanoorch_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:   nanoorch
      POSTGRES_USER: nanoorch
      # The postgres image reads POSTGRES_PASSWORD_FILE natively —
      # the database password is never visible in `docker inspect Env`.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanoorch -d nanoorch"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nanoorch_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:3000"
    # Mount all secrets at /run/secrets/<name> (read-only, 0400)
    secrets:
      - session_secret
      - admin_password
      - encryption_key
      - database_url
      - openai_api_key
      - anthropic_api_key
      - gemini_api_key
    environment:
      NODE_ENV:    production
      PORT:        3000
      MIGRATIONS_DIR: /app/migrations

      # Public URL — used to build SSO (OIDC/SAML) callback and ACS URLs.
      # Set to the full origin your identity provider will redirect to.
      # If unset, NanoOrch derives it from X-Forwarded-Proto/Host headers (correct behind Nginx).
      APP_URL: ${APP_URL:-}

      # ── _FILE pointers — real values are read from mounted secret files ──
      # The app uses loadSecret() which checks <NAME>_FILE before <NAME>.
      # database_url.txt is auto-generated by create-secrets.sh — no manual entry.
      DATABASE_URL_FILE:   /run/secrets/database_url
      SESSION_SECRET_FILE: /run/secrets/session_secret
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key

      AI_INTEGRATIONS_OPENAI_API_KEY_FILE:    /run/secrets/openai_api_key
      AI_INTEGRATIONS_ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      AI_INTEGRATIONS_GEMINI_API_KEY_FILE:    /run/secrets/gemini_api_key

      # ── Non-sensitive config (plain env vars are fine here) ──────────────
      COOKIE_SECURE:  ${COOKIE_SECURE:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}

      AI_INTEGRATIONS_OPENAI_BASE_URL:    ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      AI_INTEGRATIONS_GEMINI_BASE_URL:    ${AI_INTEGRATIONS_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}

      # Docker sandbox
      DOCKER_SOCKET:   /var/run/docker.sock
      AGENT_IMAGE:     ${AGENT_IMAGE:-nanoorch-agent:latest}
      SANDBOX_IMAGE:   ${SANDBOX_IMAGE:-nanoorch-sandbox:latest}
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-runsc}
      # Optional: gVisor runtime for agent task containers (separate from sandbox).
      # Set AGENT_RUNTIME=runsc to enable kernel-level isolation for action tasks.
      AGENT_RUNTIME:   ${AGENT_RUNTIME:-}
      # Optional: absolute host path to a custom seccomp JSON profile.
      # Applied to both agent and sandbox containers when set.
      # Example: SECCOMP_PROFILE=/etc/nanoorch/seccomp/nanoorch.json
      SECCOMP_PROFILE: ${SECCOMP_PROFILE:-}
      # DOCKER_PROXY_URL: URL that agent containers use to reach the inference proxy.
      # Default: http://host.docker.internal:3000/internal/proxy (requires Docker >= 20.10).
      # If action tasks show "Connection error", set this in your .env file:
      #   DOCKER_PROXY_URL=http://172.17.0.1:3000/internal/proxy
      DOCKER_PROXY_URL: ${DOCKER_PROXY_URL}

      # Redis — optional but recommended for session store and rate limiting.
      # Sessions fall back to PostgreSQL and rate limits fall back to in-memory
      # if this is unset.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the seccomp profile directory so SECCOMP_PROFILE path is visible
      # inside the container (existsSync check) AND to the Docker daemon (same host path).
      # If the directory does not exist on the host, Docker creates it empty and
      # the executor will skip the seccomp flag automatically.
      - /etc/nanoorch/seccomp:/etc/nanoorch/seccomp:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/me || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nanoorch_net

volumes:
  postgres_data:
  redis_data:

networks:
  nanoorch_net:
    driver: bridge
    external: true   # name of your existing RAGFlow Docker network
    name: ctgpt_rag-net
