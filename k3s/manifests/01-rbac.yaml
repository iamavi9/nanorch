apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runner
  namespace: agent-sandboxes
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-runner-role
  namespace: agent-sandboxes
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-runner-binding
  namespace: agent-sandboxes
subjects:
  - kind: ServiceAccount
    name: agent-runner
    namespace: agent-sandboxes
roleRef:
  kind: Role
  name: agent-runner-role
  apiGroup: rbac.authorization.k8s.io
